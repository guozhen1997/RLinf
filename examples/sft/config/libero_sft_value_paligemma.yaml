# Usage: bash run_value_sft.sh libero_sft_value_paligemma
# Architecture: PaliGemma (gemma_2b VLM) + Gemma expert (100m) + Value head

defaults:
  - model/value_paligemma@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all

runner:
  task_type: sft
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "value_sft_paligemma"
    logger_backends: ["tensorboard"]

  max_epochs: 30000
  max_steps: -1
  val_check_interval: 500
  save_interval: 3000

data:
  train_data_paths:
    - dataset_path: "/path/to/sft_dataset"
      type: "sft"
      weight: 1.0
      robot_type: "libero"
      model_type: "pi05"

    - dataset_path: "/path/to/rollout_dataset"
      type: "rollout"
      weight: 1.0
      robot_type: "libero"
      model_type: "pi05"

  eval_data_paths:
    - dataset_path: "/path/to/eval_dataset"
      max_samples: 10000
      robot_type: "libero"
      model_type: "pi05"

  # ----- dataloader performance -----
  train_num_workers: 8
  eval_num_workers: 4
  prefetch_factor: 4
  persistent_workers: false
  pin_memory: false
  # ----- shared dataset params -----
  include_state: true
  gamma: 1.0
  action_horizon: 10
  normalize_to_minus_one_zero: true
  include_next_obs: false
  action_dim: 7
  robot_type: "libero"
  model_type: "pi05"

  # ----- mixture settings -----
  balance_weights: true
  seed: 42

algorithm:
  adv_type: gae

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 32
  global_batch_size: 256
  seed: 0

  model:
    precision: bf16
    model_path: "/path/to/pi05_base_pytorch"
    freeze_vlm: false
    action_dim: 7
    action_horizon: 10

  optim:
    lr: 5.0e-5
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-8
    weight_decay: 1e-10
    clip_grad: 1.0
    lr_scheduler: "constant"
    lr_warmup_steps: 10000
    total_training_steps: 30000

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    use_orig_params: False
    gradient_checkpointing: True
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False

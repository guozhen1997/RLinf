defaults:
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: 0-3

runner:
  task_type: sft
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "rlt_maniskill_joint_pi05_sft"
    logger_backends: ["wandb"]

  max_epochs: -1
  max_steps: 20000
  val_check_interval: -1
  save_interval: 500

data:
  train_data_paths:
    - dataset_path: "/mnt/public2/xiekaizhi/rlt-openpi-sim/rlt_maniskill_joint"
      weight: 1.0

algorithm:
  adv_type: gae

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 32
  global_batch_size: 256
  seed: 0
  openpi_data:
    repo_id: "rlt_maniskill_joint"
    default_prompt: "insert the peg in the hole"

  model:
    precision: null
    model_path: "/mnt/public2/xiekaizhi/rlt-openpi-sim/pi05_base"
    num_action_chunks: 10
    action_dim: 8
    add_value_head: False
    openpi:
      config_name: "pi05_rlt_maniskill_joint"
      detach_critic_input: True
      num_images_in_input: 2
      train_expert_only: False

  optim:
    lr: 2.5e-5
    value_lr: 1.55e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 1.0e-10
    clip_grad: 1.0
    total_training_steps: 5000
    lr_warmup_steps: 500
    lr_scheduler: "cosine"
    num_cycles: 0.5
    min_lr: 2.5e-6

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    use_orig_params: False
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False

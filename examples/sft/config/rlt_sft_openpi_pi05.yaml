defaults:
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: 0-0

runner:
  task_type: sft
  logger:
    log_path: "../results"
    project_name: rlinf-rlt
    experiment_name: "rlt_stage1_sft_pi05_${rlt.task_name}_7d"
    logger_backends: ["tensorboard"]

  max_epochs: -1
  max_steps: 20000
  val_check_interval: -1
  save_interval: 2000

# The saved checkpoint from this run is consumed by Stage2 as
# rollout.rlt_feature_model.model_path.
rlt:
  task_name: "realworld_peg_insertion"
  openpi_config_name: "pi05_franka_state7d"
  # Used as OpenPI's norm-stats asset id. Keep this identical in Stage2.
  openpi_repo_id: "realworld_peg_insertion_rlt_stage1_7d"
  # Local LeRobot dataset root. It should directly contain data/ and meta/.
  train_data_path: "/path/to/lerobot_dataset"
  base_model_path: "/path/to/model"

  # Realworld peg insertion uses single-arm Franka actions. VLA/reference may
  # output a longer chunk than the Stage2 head consumes.
  action_dim: 7
  state_indices: []
  ref_num_action_chunks: 20
  vla_num_steps: 4
  noise_method: "flow_noise"
  noise_params: [0.16, 0.12, 200]
  joint_logprob: True

  # Stage1 RLT token transformer shape. z_dim = num_rl_tokens * rlt_embed_dim.
  z_dim: 2048
  num_rl_tokens: 1
  rlt_input_dim: 2048
  rlt_embed_dim: 2048
  rlt_prefix_seq_len: 1024
  rlt_num_layers: 2
  rlt_num_heads: 8
  rlt_mlp_ratio: 4.0

data:
  train_data_paths: ${rlt.train_data_path}
  val_data_paths: null

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 16
  global_batch_size: 64
  seed: 42

  openpi_data:
    repo_id: ${rlt.openpi_repo_id}

  model:
    model_type: "openpi"
    precision: null
    model_path: ${rlt.base_model_path}
    action_dim: ${rlt.action_dim}
    num_action_chunks: ${rlt.ref_num_action_chunks}
    num_steps: ${rlt.vla_num_steps}
    add_value_head: False
    openpi_data:
      repo_id: ${rlt.openpi_repo_id}

    openpi:
      config_name: ${rlt.openpi_config_name}
      num_images_in_input: 1
      action_chunk: ${rlt.ref_num_action_chunks}
      action_horizon: ${rlt.ref_num_action_chunks}
      action_env_dim: ${rlt.action_dim}
      num_steps: ${actor.model.num_steps}
      state_indices: ${rlt.state_indices}
      train_expert_only: False
      noise_method: ${rlt.noise_method}
      noise_params: ${rlt.noise_params}
      joint_logprob: ${rlt.joint_logprob}
      add_value_head: ${actor.model.add_value_head}
      value_after_vlm: False
      value_vlm_mode: "mean_token"
      detach_critic_input: True

      # Joint SFT objective: loss = rlt_loss + rlt_alpha * vla_loss.
      use_rlt: True
      rlt_alpha: 1.0
      rlt_input_dim: ${rlt.rlt_input_dim}
      rlt_embed_dim: ${rlt.rlt_embed_dim}
      rlt_num_rl_tokens: ${rlt.num_rl_tokens}
      rlt_prefix_seq_len: ${rlt.rlt_prefix_seq_len}
      rlt_num_layers: ${rlt.rlt_num_layers}
      rlt_num_heads: ${rlt.rlt_num_heads}
      rlt_mlp_ratio: ${rlt.rlt_mlp_ratio}
      rlt_image_only: False
      rlt_use_mask: True

  optim:
    lr: 1e-5
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 1.0e-10
    clip_grad: 1.0
    total_training_steps: ${runner.max_steps}
    lr_warmup_steps: 1000
    lr_scheduler: "cosine"
    num_cycles: 0.5
    min_lr: 2.5e-6

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    use_orig_params: False
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

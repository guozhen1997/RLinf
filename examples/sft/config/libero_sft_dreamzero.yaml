defaults:
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor: all

runner:
  task_type: sft
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "libero_sft_dreamzero"
    logger_backends: ["tensorboard"]

  max_epochs: -1
  max_steps: 20000
  val_check_interval: -1
  save_interval: 1000
  log_interval: 100

  resume_dir: null

data:
  # Root of LeRobot DROID (OXE) dataset, e.g. output of dreamzero-0/scripts/data/convert_droid.py
  #train_data_paths: /mnt/project_rlinf_hs/yuanhuining/datasets/DreamZero-DROID-Data-mini
  #train_data_paths: /mnt/project_rlinf_hs/shiletong/datasets/dreamzero/data/beijing_collect_test
  # train_data_paths: /mnt/project_rlinf/shiletong/data/dreamzero/data/beijing_collect_test
  train_data_paths: /mnt/project_rlinf_hs/yuanhuining/datasets/libero
  lazy_load: True
  num_workers: 4
  prefetch_factor: 8
  video_tolerance_s: 0.1
  parquet_cache_size: 512

algorithm:
  adv_type: gae

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 1
  global_batch_size: 8
  seed: 42
  enable_offload: False

  model:
    model_type: "dreamzero"
    precision: fp32 # fp32 when fsdp cpu offload is enabled
    model_path: /mnt/project_rlinf/guozhen/models/DreamZero-DROID
    tokenizer_path: /mnt/project_rlinf/liyanghao/data/models/umt5-xxl
    max_seq_len: 512
    state_horizon: 1
    action_horizon: 16
    num_chunks: 4
    num_video_frames: 33
    max_action_dim: 32
    max_state_dim: 64
    action_loss_scale: 1.0
    is_lora: False
    embodiment_tag: "libero_sim"

    load_to_device: False
    gradient_checkpointing: True
    enable_torch_compile: False

  optim:
    lr: 1.0e-5
    value_lr: 1.55e-4
    adam_beta1: 0.95
    adam_beta2: 0.999
    adam_eps: 1.0e-08
    weight_decay: 1.0e-5
    clip_grad: 1.0
    lr_scheduler: "cosine"
    lr_warmup_steps: -1
    lr_warmup_steps_ratio: 0.05
    total_training_steps: 50000

  fsdp_config:
    strategy: "fsdp2"
    use_orig_params: True
    gradient_checkpointing: False
    limit_all_gathers: False
    forward_prefetch: False
    backward_prefetch: null
    reshard_after_forward: True
    save_full_model_weights: False
    grad_scaler:
      enabled: False
    mixed_precision:
      param_dtype: bf16
      reduce_dtype: bf16
      buffer_dtype: bf16
    amp_autocast:
      enabled: false
      precision: "bf16"

# CFG SFT for fold_towel_sm2sm with OpenPI state history/future windows.
#
# Mirrors the CFG recipe in:
#   examples/sft/config/pnp_cfg_k8_numbins16_ensemble3_wco_lam0.25_t00_q30_cos30000.yaml
# and uses the fold towel data from:
#   examples/process/config/compute_advantages_towel_multibin_k32_numbins32_ensemble3_wco_8000.yaml
#
# Current datasets on this machine contain:
#   meta/advantages_towel_multibin_k32_numbins32_ensemble3_wco_v384_sft251_rollout177_step4000.parquet
# If you re-run advantage computation with the step8000 tag from the process
# config, update data.advantage_tag below to the step8000 suffix.
#
# Usage:
#   export OPENPI_FOLD_TOWEL_MODEL_PATH=/path/to/fold_towel_sm2sm_torch_checkpoint
#   bash examples/sft/run_cfg_sft.sh fold_towel_sm2sm_cfg_k32_numbins32_ensemble3_wco_q30

defaults:
  - model/pi0@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout
  - _self_

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 2
  component_placement:
    actor,env,rollout: all

runner:
  task_type: sft
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "fold_towel_sm2sm_cfg_k32_numbins32_ensemble3_wco_q30"
    logger_backends: ["tensorboard"]

  max_epochs: 30000
  max_steps: -1
  val_check_interval: -1
  save_interval: 10000

data:
  num_workers: 8
  advantage_tag: towel_k32_numbins16_ensemble3_wco_bs1024_3000_0317_0318_0410_cjx0415_pys0415_hyj0415_dagger0513_0514
  balance_dataset_weights: true
  seed: 42

  train_data_paths:
    # 103eps
    - dataset_path: /mnt/public2/liuzhihao/data_to_use/beijing_guqiuyi_20260317_pm_tele
      type: rollout
    - dataset_path: /mnt/public2/liuzhihao/data_to_use/beijing_guqiuyi_20260318_pm_tele
      type: rollout
    - dataset_path: /mnt/public2/liuzhihao/data_to_use/beijing_guqiuyi_20260410_pm_tele
      type: rollout
    - dataset_path: /mnt/public2/liuzhihao/data_to_use/fold_towel_cjx_0415_ep323
      type: rollout
    - dataset_path: /mnt/public2/liuzhihao/data_to_use/fold_towel_hyj_0415_ep100
      type: rollout
    - dataset_path: /mnt/public2/liuzhihao/data_to_use/fold_towel_pys_0415_ep148
      type: rollout
    - dataset_path: /mnt/public2/liuzhihao/data_to_use/beijing_guqiuyi_20260513_pm_dagger_filter_static
      type: rollout
    - dataset_path: /mnt/public2/liuzhihao/data_to_use/beijing_guqiuyi_20260514_pm_dagger_filter_static
      type: rollout

algorithm:
  adv_type: gae

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 16
  global_batch_size: 256
  seed: 0

  model:
    precision: null
    model_path: /mnt/models/pi0_base_pytorch
    model_type: "openpi"
    # Source fold_towel_sm2sm uses Pi0Config(action_horizon=20). Pi0Config.action_dim
    # remains 32 internally; 28-D is the X2Robot/ARX output action dimension.
    num_action_chunks: 20
    action_dim: 28
    num_steps: 10
    add_value_head: False
    openpi:
      config_name: "fold_towel_sm2sm"
      asset_id: "fold_towel_rewind_arm_0317_0318_0410_cjx0415_hyj0415_pys0415"
      action_chunk: 20
      action_env_dim: 28
      num_steps: 10
      train_expert_only: False
    openpi_data:
      state_history_size: 3
      state_future_size: 2
      state_step: 1

  optim:
    lr: 5.0e-5
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-8
    weight_decay: 1.0e-10
    clip_grad: 1.0
    lr_scheduler: "cosine"
    lr_warmup_steps: 10000
    total_training_steps: 30000
    min_lr: 5.0e-6

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    use_orig_params: False
    gradient_checkpointing: True
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False

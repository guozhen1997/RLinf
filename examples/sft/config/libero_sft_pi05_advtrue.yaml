defaults:
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout
  - _self_

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all

runner:
  task_type: sft
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "libero_sft_pi05_advtrue"
    logger_backends: ["tensorboard"]

  max_epochs: 30000
  max_steps: -1
  val_check_interval: -1
  save_interval: 3000

data:
  num_workers: 8
  advantage_tag: "libero_task0_multibin_k8_numbins16_ensemble3_wco_step7000_clf1k_lam0.25_t00_q30"
  balance_dataset_weights: false
  seed: 42

  train_data_paths:
    - dataset_path: "/mnt/public2/liuzhihao/data_to_use/libero_10_3shot_collect_4096_task0_fail300_copy/libero_10_3shot"
      type: "sft"
      weight: 0.03
    - dataset_path: "/mnt/public2/liuzhihao/data_to_use/libero_10_3shot_collect_4096_task0_fail300_copy/collected_data_3shot_4096_task0_merged"
      type: "rollout"
      weight: 0.97

algorithm:
  adv_type: gae

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 32
  global_batch_size: 256
  seed: 42

  model:
    precision: null
    model_path: "/mnt/project_rlinf_hs/chenkang/openpi-main/checkpoints/torch/pi05_base"
    model_type: "openpi"
    add_value_head: False
    openpi:
      config_name: "pi05_libero"
      train_expert_only: False

  optim:
    lr: 5.0e-5
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-8
    weight_decay: 1.0e-10
    clip_grad: 1.0
    lr_scheduler: "constant"
    lr_warmup_steps: 10000
    total_training_steps: 30000

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    use_orig_params: False
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False

# Advantage computation using the STEAM ensemble value model.
#
# The label written per frame is ``True`` iff the ensemble-aggregated
# p(progress) of the pair (frame_t, frame_{t+k}) exceeds
# ``advantage.positive_threshold``. ``dataset_type=="sft"`` entries are
# always labelled True (they are success demos by construction).
#
# Usage:
#   cd examples/steam/process
#   python compute_advantages_ensemble.py \
#       --config-name compute_advantages_ensemble
#   # Multi-GPU
#   torchrun --nproc_per_node=4 compute_advantages_ensemble.py \
#       --config-name compute_advantages_ensemble

advantage:
  value_checkpoint: /mnt/public2/liuzhihao/RLinf/logs/binary_value/00_cola_rewind_arm_k32_numbins32_ensemble3_bs512_onlyexp_2node_noaug_v384/checkpoints/global_step_16000/actor
  device: "cuda"
  # Ensemble does K forward passes per sample on a 2-frame pair, so batch
  # size sits well below the value-regression default of 1024.
  batch_size: 256
  num_dataloader_workers_per_gpu: 12
  prefetch_factor: 2

  # Required. "threshold" labels advantage = advantage_continuous >
  # positive_threshold (rollout only; sft frames always True). "quantile"
  # labels the top rollout_quantile fraction of rollout frames and, when
  # expert_quantile is set, the top expert_quantile fraction of sft frames;
  # the two pools are scored independently.
  label_mode: quantile

  # advantage_continuous > positive_threshold ⇒ advantage = True (rollout
  # only). Used only when label_mode == threshold.
  # positive_threshold: 0.8

  # label_mode == quantile knobs (fractions in (0, 1)).
  # rollout_quantile: fraction of top rollout frames labelled True. Required.
  # (positive_quantile is still accepted as a deprecated alias for this.)
  rollout_quantile: 0.3
  # expert_quantile: fraction of top sft (expert) frames labelled True.
  # Optional — omit to label every sft frame True (historical behaviour).
  expert_quantile: 0.8

  tag: steam_k32_ensemble3_ckpt16000_wco_exp_and_rollout

  model:
    inference_mode: "wco"
    precision: "bf16"

data:
  model_type: "pi0"
  robot_type: "restock_cola_sm2sm"

  # Pair stride — must match the training-time data.k for the loaded
  # checkpoint. Mismatching k changes the temporal scale the model was
  # trained on and silently degrades p(progress).
  k: 32

  # Camera views must match the training config; the processor's
  # image_keys were saved with these view names in the checkpoint.
  camera_keys:
    - face_view
    - left_wrist_view
    - right_wrist_view
  state_key: state

  # Must match training-time include_state_in_prompt.
  include_state_in_prompt: false
  max_state_dim: 32

  prompt: "perform the task"

  # Same dataset list as the training config so the corpus the ensemble
  # was trained on is scored. Override per run as needed.
  train_data_paths:
    - dataset_path: /mnt/public2/liuzhihao/data_to_use/restock_cola/beijing_guqiuyi_20260606_pm_tele
      type: sft
    - dataset_path: /mnt/public2/liuzhihao/data_to_use/restock_cola/beijing_guqiuyi_20260614_pm_rollout
      type: rollout

distributed:
  enabled: true
  backend: "nccl"
  timeout: 3600

# Per-episode visualization for the STEAM value model.
#
# Works with both single-model and ensemble checkpoints. Ensemble-specific
# knobs (ensemble_size, inference_mode, uwo_lambda) default to null here,
# which means "read the value from the checkpoint's config.json" — so a
# 4-member wco checkpoint loads correctly without any CLI override.
#
# Usage (single or ensemble; ensemble fields read from checkpoint):
#   cd examples/steam/process && python visualize_episodes_with_steam.py \
#       visualize.checkpoint_dir=/path/to/steam_ckpt \
#       data.train_data_paths.0.dataset_path=/path/to/dataset \
#       model.tokenizer_path=/path/to/gemma-3-270m \
#       model.vision_repo_id=/path/to/siglip-so400m-patch14-384 \
#       model.language_repo_id=/path/to/gemma-3-270m \
#       +visualize.num_episodes=5 \
#       +visualize.output_dir=./viz_binary_out
#
# Optional model-driven selection (replaces the random/explicit list with
# top-N from a strategy-ranked candidate pool — formerly its own script):
#   ... +visualize.selection_strategy=variance \
#       +visualize.num_episodes=5
# Strategies: variance | positive | negative | high_score | low_score |
#             threshold | random. `variance` and `threshold` require an
# ensemble checkpoint (their ranking metric is member variance).

visualize:
  # REQUIRED — trained SteamCriticModel checkpoint dir. No sensible
  # default since checkpoints are produced per-run; override on the CLI.
  checkpoint_dir: /path/to/steam_ckpt
  output_dir: ./viz_binary_episodes
  num_episodes: 10
  episodes: null            # explicit list; overrides num_episodes
  seed: 42
  fps: 10
  no_video: false
  dataset_index: 0
  batch_size: 32
  num_workers: 4
  decision_threshold: 0.8   # for "forward" highlighting on plots/video
  device: "cuda"
  # Optional model-driven selection — null = render the explicit/random
  # episode list as before; set to one of the strategies below to score the
  # eligible-episode pool first, rank, and render only the top num_episodes.
  # Also writes a `selection_summary.json` next to the renders.
  selection_strategy: random
  # variance | positive | negative | high_score | low_score | threshold | random
  selection_pool_size: null   # null = score all eligible episodes

model:
  # Backbones — required (HF repo id or local path) because the checkpoint
  # stores only the trained weights, not the SigLIP/Gemma assets themselves.
  # Defaults point at the shared pretrained_models dir used by the other
  # sibling value-model configs; override if yours live elsewhere.
  vision_repo_id: "/path/to/siglip"
  language_repo_id: "/path/to/gemma3"
  tokenizer_path: "/path/to/gemma/tokenizer"
  # All of the below default to null → read from the checkpoint's
  # config.json. Override only if you deliberately want to diverge from
  # the trained configuration (e.g. to sanity-check a different
  # ensemble inference_mode at test time).
  max_token_len: 200
  include_state_in_prompt: false
  max_state_dim: 32
  state_discretization_bins: 256
  fusion_hidden_dim: 512
  dropout: 0.0
  num_frames_per_pair: 2
  label_smoothing: 0.0
  # Ensemble-specific — read from checkpoint so a 4-member wco ckpt
  # loads correctly without explicit CLI overrides.
  ensemble_size: null
  inference_mode: null      # mo | wco | uwo — aggregation across members
  uwo_lambda: 1.0

data:
  train_data_paths:
    - dataset_path: /mnt/public2/liuzhihao/data_to_use/libero_10_3shot
      type: rollout
      only_success: true
  camera_keys:
    - image
    - wrist_image
  state_key: state
  k: null                       # pair stride — must match training
  # null = fall back to `model.include_state_in_prompt` (which itself
  # defaults to the checkpoint's saved value). Set explicitly to override.
  include_state_in_prompt: null
  max_state_dim: null

hydra:
  run:
    dir: .
  output_subdir: null
  job:
    chdir: false

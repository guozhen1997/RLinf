defaults:
  - env/realworld_peg_insertion@env.train
  - env/realworld_peg_insertion@env.eval
  - model/rlt_mlp_policy@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - weight_syncer/patch_syncer@weight_syncer
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 2
  component_placement:
    actor:
      node_group: "4090"
      placement: 0 # Local GPU rank in the 4090 node group (n for the n+1 th GPU)
    env:
      node_group: franka
      placement: 0 # Local robot rank in the franka node group (n for the n+1 th robot)
    rollout:
      node_group: "4090"
      placement: 0 # Local GPU rank in the 4090 node group (n for the n+1 th GPU)
  node_groups:
    - label: "4090" # GPU node group
      node_ranks: 0 # The ranks of the nodes to be included in this group， change this if your training node is not rank 0
    - label: franka
      node_ranks: 1 # Change this if your robot node is not rank 1
      hardware:
        type: Franka
        configs:
          - robot_ip: ROBOT_IP
            node_rank: 1
            controller_node_rank: 1  
            disable_validate: false

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf-rlt
    experiment_name: "rlt_stage2_ac_mlp_${rlt.task_name}"
    logger_backends: ["tensorboard"]

  max_epochs: 8000
  max_steps: -1

  only_eval: False
  val_check_interval: -1
  save_interval: -1

  resume_dir: null
  ckpt_path: null

algorithm:
  update_epoch: 8
  group_size: 1
  agg_q: min
  actor_agg_q: q1
  enable_drq: False
  q_head_type: ${actor.model.q_head_type}

  adv_type: embodied_sac
  loss_type: rlt_ac
  loss_agg_func: "token-mean"

  # RLT Stage2 actor loss: -q_weight * Q + bc_weight * BC.
  q_weight: 1.0
  bc_weight: 1.0

  # Reference-action dropout on the actor input, as in RLT Stage2.
  reference_dropout_prob: 0.0

  bootstrap_type: standard
  gamma: 0.96
  tau: 0.005

  # Entropy/alpha is kept at zero; this is not standard maximum-entropy SAC.
  entropy_tuning:
    alpha_type: fixed_alpha
    initial_alpha: 0.0
    optim:
      lr: 3.0e-4
      lr_scheduler: torch_constant
      clip_grad: 10.0

  replay_buffer:
    enable_cache: True
    cache_size: 200
    min_buffer_size: 2
    sample_window_size: 200
    auto_save: False

  target_update_freq: 1
  target_update_type: all
  train_actor_steps: 2
  critic_actor_ratio: 4
  critic_subsample_size: 0
  backup_entropy: False

# RLT Stage2 = freeze Stage1 pi0.5 + RLT token transformer, then train only the
# RLT MLP actor-critic heads.
rlt:
  task_name: "realworld_peg_insertion"

  # Stage1 checkpoint produced by examples/sft/config/rlt_sft_openpi_pi05.yaml.
  # Point this to the saved Stage1 checkpoint directory.
  stage1_model_path: "/path/to/stage1/checkpoint"
  stage1_openpi_repo_id: "realworld_peg_insertion_rlt_stage1_7d"
  openpi_config_name: "pi05_franka_state7d"

  # Stage2 action shape. ref_num_action_chunks is the VLA reference horizon;
  # num_action_chunks is the shorter chunk consumed/output by the Stage2 head.
  action_dim: 7
  # Use tcp_pose(euler) + gripper_position from the collected 19D raw state.
  state_indices: [4, 5, 6, 7, 8, 9, 0]
  proprio_dim: 7
  num_action_chunks: 10
  ref_num_action_chunks: 20
  vla_num_steps: 4
  noise_method: "flow_noise"
  noise_params: [0.16, 0.12, 200]
  joint_logprob: True

  # Must match Stage1 RLT token transformer output.
  z_dim: 2048
  num_rl_tokens: 1
  rlt_input_dim: 2048
  rlt_embed_dim: 2048
  rlt_prefix_seq_len: 1024
  rlt_num_layers: 2
  rlt_num_heads: 8
  rlt_mlp_ratio: 4.0

env:
  group_name: "EnvGroup"

  train:
    rollout_epoch: 1
    total_num_envs: 1
    auto_reset: True
    ignore_terminations: False
    keyboard_reward_wrapper: rlt_policy_switch
    use_fixed_reset_state_ids: False
    max_episode_steps: 300
    max_steps_per_rollout_epoch: 300
    use_spacemouse: True
    use_gello: False
    use_pico: False
    no_gripper: False
    override_cfg:
      is_dummy: False
      use_dense_reward: False
      reward_scale: 1.0
      max_num_steps: 300
      target_ee_pose: TARGET_EE_POSE
      success_hold_steps: 1
      gripper_type: none

    action_dim: ${rlt.action_dim}
    num_action_chunks: ${rlt.num_action_chunks}
    ref_num_action_chunks: ${rlt.ref_num_action_chunks}

  eval:
    rollout_epoch: 1
    total_num_envs: 1
    auto_reset: True
    ignore_terminations: False
    keyboard_reward_wrapper: rlt_policy_switch
    max_episode_steps: 100
    max_steps_per_rollout_epoch: 100
    use_fixed_reset_state_ids: False
    group_size: 1
    use_spacemouse: True
    use_gello: False
    use_pico: False
    no_gripper: False
    override_cfg:
      is_dummy: False
      use_dense_reward: False
      reward_scale: 1.0
      max_num_steps: 300
      target_ee_pose: TARGET_EE_POSE
      success_hold_steps: 1
      gripper_type: none
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  enable_offload: False
  pipeline_stage_num: 1

  collect_transitions: True
  collect_prev_infos: False

  # Synced Stage2 policy. This is initialized from actor.model and then kept in
  # sync by RLinf weight_syncer; model_path can stay empty for scratch training.
  model:
    model_path: "/path/to/stage2/model"
    precision: ${actor.model.precision}
    action_dim: ${actor.model.action_dim}
    num_action_chunks: ${actor.model.num_action_chunks}
    ref_num_action_chunks: ${actor.model.ref_num_action_chunks}

  # Frozen Stage1 pi0.5 + RLT token transformer. Rollout uses it to convert raw
  # env observations into the Stage2 obs dict: z_rl, proprio, ref_chunk.
  rlt_feature_model:
    model_type: "openpi"
    model_path: ${rlt.stage1_model_path}
    precision: null
    num_action_chunks: ${rlt.ref_num_action_chunks}
    action_dim: ${rlt.action_dim}
    add_value_head: False
    is_lora: False
    lora_rank: 32
    openpi_data:
      repo_id: ${rlt.stage1_openpi_repo_id}
    openpi:
      config_name: ${rlt.openpi_config_name}
      num_images_in_input: 1
      action_chunk: ${rlt.ref_num_action_chunks}
      action_horizon: ${rlt.ref_num_action_chunks}
      action_env_dim: ${rlt.action_dim}
      num_steps: ${rlt.vla_num_steps}
      state_indices: ${rlt.state_indices}
      train_expert_only: False
      noise_method: ${rlt.noise_method}
      noise_params: ${rlt.noise_params}
      joint_logprob: ${rlt.joint_logprob}
      add_value_head: False
      value_after_vlm: False
      value_vlm_mode: "mean_token"
      detach_critic_input: True
      use_rlt: True
      rlt_input_dim: ${rlt.rlt_input_dim}
      rlt_embed_dim: ${rlt.rlt_embed_dim}
      rlt_num_rl_tokens: ${rlt.num_rl_tokens}
      rlt_prefix_seq_len: ${rlt.rlt_prefix_seq_len}
      rlt_num_layers: ${rlt.rlt_num_layers}
      rlt_num_heads: ${rlt.rlt_num_heads}
      rlt_mlp_ratio: ${rlt.rlt_mlp_ratio}
      rlt_image_only: False
      rlt_use_mask: True

  enable_torch_compile: True
  enable_cuda_graph: False

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"

  micro_batch_size: 256
  global_batch_size: 256
  seed: 1234
  enable_offload: False

  model:
    action_dim: ${rlt.action_dim}
    num_action_chunks: ${rlt.num_action_chunks}
    ref_num_action_chunks: ${rlt.ref_num_action_chunks}
    z_dim: ${rlt.z_dim}
    proprio_dim: ${rlt.proprio_dim}
    add_q_head: True
    q_head_type: "default"
    fixed_std: 0.002

  optim:
    clip_grad: 10.0
    lr: 3e-4
    lr_scheduler: torch_constant

  critic_optim:
    clip_grad: 10.0
    lr: 3e-4
    lr_scheduler: torch_constant

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False

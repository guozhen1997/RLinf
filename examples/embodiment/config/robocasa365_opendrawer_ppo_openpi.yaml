defaults:
  - env/robocasa365@env.train
  - env/robocasa365@env.eval
  - model/pi0@actor.model
  - weight_syncer/patch_syncer@weight_syncer
  - hybrid_engines/fsdp@actor.fsdp_config
  - _self_
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all

runner:
  task_type: embodied
  logger:
    log_path: ${oc.env:ROBOCASA365_RL_LOG_DIR,../results}
    project_name: rlinf
    experiment_name: "robocasa365_ppo_openpi_opendrawer"
    logger_backends: ["tensorboard"]

  max_epochs: 1000
  max_steps: -1
  val_check_interval: -1
  save_interval: 20

  resume_dir: null
  ckpt_path: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 1
  reward_coef: 1.0

  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: token_level

  update_epoch: 4
  adv_type: gae
  loss_type: actor_critic
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  filter_rewards: False
  rewards_lower_bound: 0.1
  rewards_upper_bound: 0.9
env:
  group_name: "EnvGroup"

  train:
    rollout_epoch: 4
    total_num_envs: 32
    split: pretrain
    task_soup: atomic_seen
    task_filter: ["OpenDrawer"]
    task_mode: atomic
    task_sampling_strategy: random
    max_episode_steps: 400
    max_steps_per_rollout_epoch: 400
    reward_coef: ${algorithm.reward_coef}
    group_size: ${algorithm.group_size}
  eval:
    rollout_epoch: 1
    total_num_envs: 32
    split: pretrain
    task_soup: atomic_seen
    task_filter: ["OpenDrawer"]
    task_mode: atomic
    task_sampling_strategy: ordered
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 750
    max_steps_per_rollout_epoch: 750
    group_size: 1
    is_eval: True
    video_cfg:
      save_video: False
      info_on_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  unnorm_key: robocasa
  enable_offload: False
  pipeline_stage_num: 1
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False
    max_new_tokens: null

  model:
    model_path: ${oc.env:ROBOCASA365_OPENPI_CKPT,/path/to/pi0-robocasa-pretrain-human300}
    precision: null

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 128
  global_batch_size: 2048
  seed: 42
  enable_offload: False

  model:
    model_path: ${oc.env:ROBOCASA365_OPENPI_CKPT,/path/to/pi0-robocasa-pretrain-human300}
    num_action_chunks: 5
    action_dim: 12
    num_steps: 5
    add_value_head: True
    openpi:
      config_name: "pi0_robocasa365_pretrain_human300"
      num_images_in_input: 2
      num_steps: 5
      detach_critic_input: True
    openpi_data:
      state_space: "16d"
      image_space: "2views"
      action_space: "12d"

  optim:
    lr: 5.0e-6
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 1.0
    critic_warmup_steps: 0

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: null
      reduce_dtype: null
      buffer_dtype: null

reward:
  use_reward_model: False

critic:
  use_critic_model: False

defaults:
  - env/maniskill_rlt@env.train
  - env/maniskill_rlt@env.eval
  - hybrid_engines/fsdp@actor.fsdp_config
  - weight_syncer/patch_syncer@weight_syncer
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor: 0-0
    env: all
    rollout: all

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "maniskill_rlt_stage2_ac_mlp"
    logger_backends: ["wandb"]

  max_epochs: 5000
  max_steps: -1
  only_eval: False
  weight_sync_interval: 1
  val_check_interval: 25
  save_interval: 50
  resume_dir: null
  ckpt_path: null

algorithm:
  update_epoch: 5
  rlt_schedule:
    enable: True
    max_updates_per_train_step: 400
    warmup_min_size: 10000
    warmup_post_collect_updates: 30000
    train_every_episodes: 0
    train_every_transitions: 5
  group_size: 1

  adv_type: embodied_sac
  loss_type: rlt_ac
  loss_agg_func: "token-mean"

  agg_q: min
  actor_agg_q: q1
  enable_drq: False
  q_head_type: ${actor.model.q_head_type}
  bootstrap_type: standard
  gamma: 0.96
  tau: 0.005

  # RLT actor objective: -q_weight * Q + bc_weight * BC.
  q_weight: 1.0
  bc_weight: 1.0
  reference_dropout_prob: 0.5
  # Schedule for the BC/Q weights in the actor objective. Disable it to use
  # the fixed bc_weight and q_weight above for the entire run.
  actor_weight_schedule:
    enable: True
    warmup_updates: 20000
    ramp_updates: 50000
    warmup_bc_weight: 7.0
    warmup_q_weight: 0.05
    online_bc_weight: 2.5
    online_q_weight: 0.45

  entropy_tuning:
    alpha_type: fixed_alpha
    initial_alpha: 0.0
    optim:
      lr: 3.0e-4
      lr_scheduler: torch_constant
      clip_grad: 10.0

  replay_buffer:
    enable_cache: True
    cache_size: 10000
    sample_window_size: 50000
    max_num_samples: 50000
    min_buffer_size: 1000
    auto_save: False

  target_update_freq: 1
  target_update_type: all
  train_actor_steps: 1000
  critic_actor_ratio: 4
  critic_subsample_size: 0
  backup_entropy: False

env:
  group_name: "EnvGroup"
  train:
    rollout_epoch: 1
    total_num_envs: 64
    seed: 2026
    auto_reset: False
    ignore_terminations: False
    use_fixed_reset_state_ids: False
    wrap_obs_mode: rlt_openpi_joint
    reward_mode: only_success
    rlt_policy_switch:
      enable: True
      task_mode: full_task
      trigger_mode: auto
      latch_until_done: True
      auto_gate:
        require_grasp: True
        require_not_success: True
        near_hole_x_min: -0.16
        near_hole_yz_margin: 1.5
        fallback_hole_radius: 0.03
      expert_takeover:
        enable: True
        # Simulated real-world takeover: only request expert after the RLT actor
        # is already in critical phase and has made no measurable insertion
        # progress for several action chunks. Rollout still masks this during
        # warmup, and eval disables expert completely.
        trigger_mode: stalled_progress
        gate:
          require_grasp: True
          require_not_success: True
          # Do not diagnose "stuck" immediately after critical entry; first
          # require the peg head to be close enough to the hole for insertion
          # attempts to be meaningful.
          near_hole_x_min: -0.10
          near_hole_yz_margin: 2.0
          # A chunk is considered improved if x advances, yz alignment improves,
          # or the combined score x - progress_yz_weight * yz improves enough.
          stuck_chunks_before_takeover: 3
          min_x_progress: 0.003
          min_yz_progress: 0.0015
          min_score_progress: 0.002
          progress_yz_weight: 1.0
          fallback_hole_radius: 0.03
    max_episode_steps: 500
    max_steps_per_rollout_epoch: 500
    action_dim: 8
    num_action_chunks: 10
    ref_num_action_chunks: 10
    init_params:
      id: "PegInsertionSideWideClearance-v1"
      obs_mode: "rgb"
      control_mode: "pd_joint_delta_pos"
      reward_mode: "sparse"
      sim_config:
        sim_freq: 100
        control_freq: 10
      sensor_configs:
        width: 384
        height: 384
  eval:
    rollout_epoch: 1
    total_num_envs: 256
    seed: 2026
    auto_reset: False
    ignore_terminations: False
    use_fixed_reset_state_ids: True
    wrap_obs_mode: rlt_openpi_joint
    reward_mode: only_success
    rlt_policy_switch:
      enable: True
      task_mode: full_task
      trigger_mode: auto
      latch_until_done: True
      auto_gate:
        require_grasp: True
        require_not_success: True
        near_hole_x_min: -0.16
        near_hole_yz_margin: 1.5
        fallback_hole_radius: 0.03
      expert_takeover:
        enable: False
        # Eval is full-task: base policy before critical phase, actor after
        # critical phase, and no expert intervention.
        trigger_mode: stalled_progress
        gate:
          require_grasp: True
          require_not_success: True
          near_hole_x_min: -0.10
          near_hole_yz_margin: 2.0
          stuck_chunks_before_takeover: 3
          min_x_progress: 0.003
          min_yz_progress: 0.0015
          min_score_progress: 0.002
          progress_yz_weight: 1.0
          fallback_hole_radius: 0.03
    max_episode_steps: 500
    max_steps_per_rollout_epoch: 500
    policy_mode: eval
    group_size: 1
    action_dim: 8
    num_action_chunks: 10
    ref_num_action_chunks: 10
    video_cfg:
      save_video: False
      fps: 10
      record_every: 1
      video_base_dir: ${runner.logger.log_path}/video/eval
    init_params:
      id: "PegInsertionSideWideClearance-v1"
      obs_mode: "rgb"
      control_mode: "pd_joint_delta_pos"
      reward_mode: "sparse"
      sim_config:
        sim_freq: 100
        control_freq: 10
      sensor_configs:
        width: 384
        height: 384

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: False
  pipeline_stage_num: 1
  collect_transitions: True
  collect_prev_infos: True

  model:
    model_type: ${actor.model.model_type}
    model_path: ""
    precision: ${actor.model.precision}
    policy_setup: ${actor.model.policy_setup}
    action_dim: ${actor.model.action_dim}
    num_action_chunks: ${actor.model.num_action_chunks}
    ref_num_action_chunks: ${actor.model.ref_num_action_chunks}
    z_dim: ${actor.model.z_dim}
    proprio_dim: ${actor.model.proprio_dim}
    add_q_head: ${actor.model.add_q_head}
    q_head_type: ${actor.model.q_head_type}
    fixed_std: ${actor.model.fixed_std}
    is_lora: False
    lora_rank: 32

  rlt_feature_model:
    model_type: "openpi"
    model_path: "/path/to/maniskill_rlt_stage1_sft_openpi_pi05/checkpoints/global_step_<step>/actor"
    precision: null
    num_action_chunks: 10
    action_dim: 8
    add_value_head: False
    is_lora: False
    lora_rank: 32
    openpi_data:
      repo_id: "maniskill_peginsertionside_joint"
      default_prompt: "insert the peg in the hole"
    openpi:
      config_name: "pi05_rlt_maniskill_joint"
      num_images_in_input: 2
      action_chunk: 10
      action_horizon: 10
      action_env_dim: 8
      num_steps: 5
      train_expert_only: False
      add_value_head: False
      detach_critic_input: True
      use_rlt: True
      rlt_alpha: 1.0
      rlt_input_dim: 2048
      rlt_embed_dim: 2048
      rlt_num_rl_tokens: 1
      rlt_prefix_seq_len: 1024
      rlt_num_layers: 2
      rlt_num_heads: 8
      rlt_mlp_ratio: 4.0
      rlt_encoder_type: "append_self_attention"
      rlt_image_only: False
      rlt_use_mask: True

  # Optional ManiSkill expert takeover model. Enable it with
  # env.train.rlt_policy_switch.expert_takeover.enable=True.
  expert_model:
    model_path: "/path/to/rlt_maniskill_joint_pi05_sft/checkpoints/global_step_<step>/actor"
    precision: null
    openpi:
      use_rlt: False

  enable_torch_compile: False
  enable_cuda_graph: False

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 128
  global_batch_size: 512
  seed: 1234
  enable_offload: False

  model:
    model_type: "rlt_mlp_policy"
    # RLT AC keeps the small Stage2 head in fp32 for Q-learning stability.
    precision: fp32
    policy_setup: "panda-qpos"
    action_dim: 8
    num_action_chunks: 10
    ref_num_action_chunks: 10
    z_dim: 2048
    proprio_dim: 9
    add_value_head: False
    add_q_head: True
    q_head_type: "default"
    fixed_std: 0.002
    is_lora: False
    lora_rank: 32

  optim:
    clip_grad: 10.0
    lr: 1.0e-4
    lr_scheduler: torch_constant

  critic_optim:
    clip_grad: 10.0
    lr: 1.0e-4
    lr_scheduler: torch_constant

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False

defaults:
  - model/gr00t_16@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:REPO_PATH}/examples/embodiment/config

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all

runner:
  task_type: sft
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "test_gr00t_16"
    logger_backends: ["tensorboard"] # wandb, swanlab

  max_epochs: 2
  max_steps: -1
  val_check_interval: -1
  save_interval: 10

data:
  train_data_paths: "/workspace/dataset/Gr00t_16-libero-Spatial-dataset"

algorithm:
  adv_type: gae

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 1
  global_batch_size: 256
  seed: 0

  # Override the default values in model/gr00t_16
  model:
    precision: "bf16"
    model_path: "/workspace/dataset/GR00T-N1.6-3B"
    model_type: "gr00t_1_6_sft"
    num_action_chunks: 1 
    add_value_head: True
    denoising_steps: 10
    no_split_modules:
      - "Qwen3DecoderLayer"
      - "Siglip2EncoderLayer"
      - "FlowMatchingActionHeadForRLActionPrediction"
      - "TimestepEncoder"
      - "TimestepEmbedding"
      - "ValueHead"
      - "ExploreNoiseNet"

  optim:
    lr: 5.0e-6
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-05
    weight_decay: 0.01
    clip_grad: 1.0

  # Override the default values in training_backend/fsdp
  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "full_shard"
    use_orig_params: True
    gradient_checkpointing: True
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
defaults:
  - model/pi0_5@actor.model
  - hybrid_engines/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:REPO_PATH}/examples/sft/config

cluster:
  num_nodes: 1
  component_placement:
    actor: 0-1

runner:
  task_type: sft
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "ci_maniskill_rlt_stage1_sft_openpi_pi05"
    logger_backends: null

  max_epochs: -1
  max_steps: 2
  val_check_interval: -1
  save_interval: -1

data:
  train_data_paths:
    - dataset_path: "/workspace/dataset/data/sft-ci-data/rlt/rlt-maniskill-PegInsertionSide-v1-400-succ-partial/"
      weight: 1.0

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 1
  global_batch_size: 2
  seed: 0

  model:
    precision: null
    model_path: "/workspace/dataset/pi05_base/"
    model_type: "openpi"
    num_action_chunks: 10
    action_dim: 8
    add_value_head: False
    num_steps: 5
    openpi:
      config_name: "pi05_rlt_maniskill_joint"
      num_images_in_input: 2
      train_expert_only: False
      detach_critic_input: True
      action_horizon: 10
      action_chunk: ${actor.model.num_action_chunks}
      action_env_dim: ${actor.model.action_dim}
      num_steps: ${actor.model.num_steps}
      use_rlt: True
      rlt_alpha: 1.0
      rlt_input_dim: 2048
      rlt_embed_dim: 2048
      rlt_num_rl_tokens: 1
      rlt_prefix_seq_len: 1024
      rlt_num_layers: 2
      rlt_num_heads: 8
      rlt_mlp_ratio: 4.0
      rlt_encoder_type: "append_self_attention"
      rlt_image_only: False
      rlt_use_mask: True

    openpi_data:
      repo_id: "maniskill_peginsertionside_joint"
      default_prompt: "insert the peg in the hole"
      norm_stats_path: "/workspace/dataset/data/sft-ci-data/rlt/rlt-maniskill-PegInsertionSide-v1-400-succ-partial/norm_stats.json"

  optim:
    lr: 2.5e-5
    value_lr: 1.55e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 1.0e-10
    clip_grad: 1.0
    total_training_steps: 2
    lr_warmup_steps: 0
    lr_scheduler: "cosine"
    num_cycles: 0.5
    min_lr: 2.5e-6

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    use_orig_params: False
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

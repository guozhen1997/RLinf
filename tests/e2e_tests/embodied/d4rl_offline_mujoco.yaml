defaults:
  - model/mlp_policy@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:REPO_PATH}/examples/embodiment/config

cluster:
  num_nodes: 1
  component_placement:
    actor: 0-0

runner:
  task_type: embodied
  logger:
    log_path: /workspace/results/d4rl_offline_mujoco
    project_name: rlinf
    experiment_name: "ci-test"
    logger_backends: ["tensorboard"]

  max_epochs: 1000000
  max_steps: 500  # CI: reduced for fast run

  only_eval: false
  val_check_interval: 250 # CI: ensure eval runs (max_steps=500, eval at 250)
  save_interval: -1

  resume_dir: null
  save_dir: null
  ckpt_path: null

  log_interval: 500
  local_update_steps: 100  # CI: reduced for fast run
  eval_episodes: 5  # CI: reduced

algorithm:
  adv_type: null
  batch_size: 256
  actor_lr: 3.0e-4
  value_lr: 3.0e-4
  critic_lr: 3.0e-4
  hidden_dims: [256, 256]
  discount: 0.99
  tau: 0.005
  expectile: 0.7
  temperature: 3.0
  dropout_rate: null
  opt_decay_schedule: "cosine"

env:
  group_name: "EnvGroup"
  env_name: "halfcheetah-medium-expert-v2"

rollout:
  group_name: "RolloutGroup"
  pipeline_stage_num: 1

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  use_fsdp_wrap: false
  seed: 42
  offline_torch_compile: true

reward:
  use_reward_model: false

critic:
  use_critic_model: false

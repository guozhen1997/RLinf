defaults:
  - env/maniskill_rlt@env.train
  - env/maniskill_rlt@env.eval
  - hybrid_engines/fsdp@actor.fsdp_config
  - weight_syncer/patch_syncer@weight_syncer
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:REPO_PATH}/examples/embodiment/config

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: 0-1

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "ci_maniskill_rlt_stage2_ac_mlp"
    logger_backends: null

  max_epochs: 2
  max_steps: -1
  only_eval: False
  weight_sync_interval: 1
  val_check_interval: -1
  save_interval: -1
  resume_dir: null
  ckpt_path: null

algorithm:
  update_epoch: 1
  rlt_schedule:
    enable: True
    max_updates_per_train_step: 4
    warmup_min_size: 16
    warmup_post_collect_updates: 2
    train_every_episodes: 0
    train_every_transitions: 1
  group_size: 1

  adv_type: embodied_sac
  loss_type: rlt_ac
  loss_agg_func: "token-mean"

  agg_q: min
  actor_agg_q: q1
  enable_drq: False
  q_head_type: ${actor.model.q_head_type}
  bootstrap_type: standard
  gamma: 0.96
  tau: 0.005

  q_weight: 1.0
  bc_weight: 1.0
  reference_dropout_prob: 0.5
  actor_weight_schedule:
    enable: False

  entropy_tuning:
    alpha_type: fixed_alpha
    initial_alpha: 0.0
    optim:
      lr: 3.0e-4
      lr_scheduler: torch_constant
      clip_grad: 10.0

  replay_buffer:
    enable_cache: True
    cache_size: 32
    sample_window_size: 32
    max_num_samples: 64
    min_buffer_size: 8
    auto_save: False

  target_update_freq: 1
  target_update_type: all
  train_actor_steps: 16
  critic_actor_ratio: 2
  critic_subsample_size: 0
  backup_entropy: False

env:
  group_name: "EnvGroup"
  train:
    rollout_epoch: 1
    total_num_envs: 8
    seed: 2026
    max_episode_steps: 50
    max_steps_per_rollout_epoch: 20
    action_dim: 8
    num_action_chunks: 10
    ref_num_action_chunks: 10
    rlt_policy_switch:
      expert_takeover:
        enable: False
  eval:
    rollout_epoch: 1
    total_num_envs: 8
    seed: 2026
    use_fixed_reset_state_ids: True
    max_episode_steps: 50
    max_steps_per_rollout_epoch: 10
    policy_mode: eval
    group_size: 1
    action_dim: 8
    num_action_chunks: 10
    ref_num_action_chunks: 10
    video_cfg:
      save_video: False
    rlt_policy_switch:
      expert_takeover:
        enable: False

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: False
  pipeline_stage_num: 1
  collect_transitions: True
  collect_prev_infos: True

  model:
    model_type: ${actor.model.model_type}
    model_path: ""
    precision: ${actor.model.precision}
    policy_setup: ${actor.model.policy_setup}
    action_dim: ${actor.model.action_dim}
    num_action_chunks: ${actor.model.num_action_chunks}
    ref_num_action_chunks: ${actor.model.ref_num_action_chunks}
    z_dim: ${actor.model.z_dim}
    proprio_dim: ${actor.model.proprio_dim}
    add_q_head: ${actor.model.add_q_head}
    q_head_type: ${actor.model.q_head_type}
    fixed_std: ${actor.model.fixed_std}
    is_lora: False
    lora_rank: 32

  rlt_feature_model:
    model_type: "openpi"
    # Stage1 SFT output from ci_maniskill_rlt_stage1_sft_openpi_pi05.
    model_path: "/workspace/dataset/RLinf-Maniskill-RLT-Stage1/"
    precision: null
    num_action_chunks: 10
    action_dim: 8
    add_value_head: False
    is_lora: False
    lora_rank: 32
    openpi_data:
      repo_id: "maniskill_peginsertionside_joint"
      default_prompt: "insert the peg in the hole"
      norm_stats_path: "/workspace/dataset/data/sft-ci-data/rlt/rlt-maniskill-PegInsertionSide-v1-400-succ-partial/norm_stats.json"
    openpi:
      config_name: "pi05_rlt_maniskill_joint"
      num_images_in_input: 2
      action_chunk: 10
      action_horizon: 10
      action_env_dim: 8
      num_steps: 5
      train_expert_only: False
      add_value_head: False
      detach_critic_input: True
      use_rlt: True
      rlt_alpha: 1.0
      rlt_input_dim: 2048
      rlt_embed_dim: 2048
      rlt_num_rl_tokens: 1
      rlt_prefix_seq_len: 1024
      rlt_num_layers: 2
      rlt_num_heads: 8
      rlt_mlp_ratio: 4.0
      rlt_encoder_type: "append_self_attention"
      rlt_image_only: False
      rlt_use_mask: True

  enable_torch_compile: False
  enable_cuda_graph: False

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 32
  global_batch_size: 64
  seed: 1234
  enable_offload: False

  model:
    model_type: "rlt_mlp_policy"
    precision: fp32
    policy_setup: "panda-qpos"
    action_dim: 8
    num_action_chunks: 10
    ref_num_action_chunks: 10
    z_dim: 2048
    proprio_dim: 9
    add_value_head: False
    add_q_head: True
    q_head_type: "default"
    fixed_std: 0.002
    is_lora: False
    lora_rank: 32

  optim:
    clip_grad: 10.0
    lr: 1.0e-4
    lr_scheduler: torch_constant

  critic_optim:
    clip_grad: 10.0
    lr: 1.0e-4
    lr_scheduler: torch_constant

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

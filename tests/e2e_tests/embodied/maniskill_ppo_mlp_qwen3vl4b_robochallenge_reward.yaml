defaults:
  - env/maniskill_pick_cube_prompt@env.train
  - env/maniskill_pick_cube_prompt@env.eval
  - model/mlp_policy@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:REPO_PATH}/examples/embodiment/config

cluster:
  num_nodes: 1
  component_placement:
    actor: 0-0
    env: 0-0
    rollout: 0-0
    reward: 0-0

runner:
  task_type: embodied
  logger:
    log_path: "/workspace/results/maniskill_ppo_mlp_qwen3vl4b_robochallenge_reward"
    project_name: rlinf
    experiment_name: "ci-test"
    logger_backends: ["tensorboard"]

  max_epochs: 2
  max_steps: -1

  only_eval: False
  eval_policy_path: null
  val_check_interval: -1
  save_interval: -1

  resume_dir: null
  ckpt_path: null

algorithm:
  update_epoch: 8
  normalize_advantages: True
  kl_penalty: kl
  group_size: 1

  rollout_epoch: 1
  eval_rollout_epoch: 1

  reward_type: action_level
  logprob_type: action_level
  entropy_type: action_level

  adv_type: gae
  loss_type: actor_critic
  loss_agg_func: "token-mean"
  bootstrap_type: always
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 1.0
  huber_delta: 10.0

  gamma: 0.8
  gae_lambda: 0.9

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 0
    top_p: 1.0
    repetition_penalty: 1.0

  length_params:
    max_new_token: 7
    max_length: 1024
    min_length: 1

data:
  rollout_batch_size: 128

env:
  group_name: "EnvGroup"

  train:
    total_num_envs: 32
    wrap_obs_mode: simple_prompt
    auto_reset: True
    ignore_terminations: False
    use_rel_reward: False
    reward_mode: raw
    seed: 0
    group_size: 1
    use_fixed_reset_state_ids: False
    max_episode_steps: 50
    max_steps_per_rollout_epoch: 50
    use_full_state: True
    is_eval: False
    init_params:
      id: "PickCube-v1"
      obs_mode: "rgb"
      control_mode: "pd_joint_delta_pos"
      sim_backend: "gpu"
      sim_config:
        sim_freq: 100
        control_freq: 20
      sensor_configs:
        shader_pack: "default"
        width: 224
        height: 224
      render_mode: all

  eval:
    total_num_envs: 32
    wrap_obs_mode: simple_prompt
    auto_reset: True
    ignore_terminations: True
    use_rel_reward: False
    reward_mode: raw
    seed: 0
    max_episode_steps: 50
    max_steps_per_rollout_epoch: 50
    use_fixed_reset_state_ids: True
    group_size: 1
    use_full_state: True
    is_eval: True
    init_params:
      id: "PickCube-v1"
      obs_mode: "rgb"
      control_mode: "pd_joint_delta_pos"
      sim_backend: "gpu"
      sim_config:
        sim_freq: 100
        control_freq: 20
      sensor_configs:
        shader_pack: "default"
        width: 224
        height: 224
      render_mode: all
    video_cfg:
      save_video: True
      info_on_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: False
  pipeline_stage_num: 1

  model:
    model_path: ""
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 128
  global_batch_size: 128
  seed: 1234
  enable_offload: False

  model:
    model_path: ""
    model_type: "mlp_policy"
    obs_dim: 42

  optim:
    lr: 3.0e-4
    value_lr: 3.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 0.5

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: True
  group_name: "RewardGroup"

  reward_mode: "history_buffer"
  history_reward_assign: True

  use_output_step: 0

  reward_weight: 1.0
  env_reward_weight: 0.0

  model:
    model_type: "history_vlm"
    model_path: "/workspace/dataset/Qwen3-VL-4B-Instruct" # proxy, not trained yet
    lora_path: "/workspace/dataset/Qwen3-VL-4B-Instruct_lora" # proxy, not trained yet
    enable_debug_video_output: false
    debug_video_output_dir: ${runner.logger.log_path}/reward_debug_videos
    debug_video_fps: 4
    precision: "bf16"

    input_builder_name: "simple_robochallenge_input_builder"
    reward_parser_name: "robochallenge_reward_parser"

    history_buffers:
      history_window:
        history_size: 5
        input_interval: 5
        history_keys: ["main_images"]
        input_on_done: false

    enable_history_offload: true
    infer_micro_batch_size: 64

    subprocessor_kwargs:
      video_processor:
        do_sample_frames: True

    max_new_tokens: 64
    temperature: 1.0
    use_chat_template: true

critic:
  use_critic_model: False
